<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ESI发票重命名工具</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>ESI 发票重命名工具</h1>
        <p class="subtitle">按 发票号 · 用户名 · Tracking Number 自动重命名 PDF</p>
      </header>

      <section class="card toolbar">
        <div class="tb-row">
          <div class="tb-folder">
            <span class="tb-folder-icon">📁</span>
            <input id="sourceDir" type="text" readonly placeholder="点击选择源文件夹" />
            <button id="pickDirBtn" type="button" class="tb-pick">选择</button>
          </div>
          <input id="userName" class="tb-input" type="text" placeholder="用户名，如 Felix" autocomplete="off" />
          <input id="trackingNumber" class="tb-input tb-tn" type="text" placeholder="TN，如 000-116-216" autocomplete="off" />
          <button id="runBtn" type="button" class="primary">开始重命名</button>
        </div>
        <span id="formError" class="error-text" aria-live="polite"></span>
      </section>

      <section class="card panel" data-mode="idle">
        <header class="panel-header">
          <h2 class="panel-title panel-title-idle">使用说明</h2>
          <h2 class="panel-title panel-title-run">执行结果</h2>
          <div class="panel-actions">
            <button id="openFolderBtn" class="ghost ghost-accent" type="button" hidden title="在访达中打开输出文件夹">打开文件夹</button>
            <button id="clearLogBtn" class="ghost" type="button" title="清空并返回说明">返回说明</button>
          </div>
        </header>

        <div id="summaryBar" class="summary-bar">
          <div class="summary-total">
            <span class="summary-total-label">价税合计总和</span>
            <span id="summaryAmount" class="summary-total-value">¥0.00</span>
          </div>
          <div id="summaryStats" class="summary-stats">共 0 张</div>
        </div>

        <div id="progressTrack" class="progress" hidden>
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <span id="progressText" class="progress-text">0 / 0</span>
        </div>

        <div id="helpView" class="help">
          <ol class="help-steps">
            <li><strong>选择</strong>存放发票 PDF 的源文件夹</li>
            <li>填写<strong>用户名</strong>与 <strong>Tracking Number</strong></li>
            <li>点击 <strong>开始重命名</strong>，等待日志结束</li>
          </ol>

          <div class="help-block">
            <span class="help-block-label">输出路径</span>
            <code class="help-example">源文件夹 / &lt;TN&gt; / &lt;发票号&gt;-&lt;用户名&gt;-&lt;TN&gt;.pdf</code>
          </div>

          <p class="help-note">
            <span>复制不移动</span>
            <span>·</span>
            <span>同名自动加序号</span>
            <span>·</span>
            <span>仅扫描顶层 PDF</span>
          </p>
        </div>

        <div id="resultTable" class="result-table">
          <table>
            <thead>
              <tr>
                <th class="col-idx">#</th>
                <th class="col-name">源文件名</th>
                <th class="col-invoice">发票号</th>
                <th class="col-amount">合计</th>
                <th class="col-status">结果</th>
              </tr>
            </thead>
            <tbody id="resultBody" aria-live="polite"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
