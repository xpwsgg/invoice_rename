<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ESI发票重命名工具</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>ESI 发票重命名工具</h1>
        <p class="subtitle">按 发票号 · 用户名 · Tracking Number 自动重命名 PDF</p>
      </header>

      <section class="card form">
        <label class="field">
          <span class="field-label">源文件夹</span>
          <div class="row">
            <input id="sourceDir" type="text" readonly placeholder="点击右侧选择文件夹" />
            <button id="pickDirBtn" type="button">选择</button>
          </div>
        </label>

        <label class="field">
          <span class="field-label">用户名</span>
          <input id="userName" type="text" placeholder="如：Felix" autocomplete="off" />
        </label>

        <label class="field">
          <span class="field-label">Tracking Number</span>
          <input id="trackingNumber" type="text" placeholder="如：000-115-216" autocomplete="off" />
        </label>

        <div class="actions">
          <span id="formError" class="error-text" aria-live="polite"></span>
          <button id="runBtn" type="button" class="primary">开始重命名</button>
        </div>
      </section>

      <section class="card panel" data-mode="idle">
        <header class="panel-header">
          <h2 class="panel-title panel-title-idle">使用说明</h2>
          <h2 class="panel-title panel-title-run">执行日志</h2>
          <div class="panel-actions">
            <button id="openFolderBtn" class="ghost ghost-accent" type="button" hidden title="在访达中打开输出文件夹">打开文件夹</button>
            <button id="clearLogBtn" class="ghost" type="button" title="清空并返回说明">返回说明</button>
          </div>
        </header>

        <div id="progressTrack" class="progress" hidden>
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <span id="progressText" class="progress-text">0 / 0</span>
        </div>

        <div id="helpView" class="help">
          <ol class="help-steps">
            <li><strong>选择</strong>存放发票 PDF 的源文件夹</li>
            <li>填写<strong>用户名</strong>与 <strong>Tracking Number</strong></li>
            <li>点击 <strong>开始重命名</strong>，等待日志结束</li>
          </ol>

          <div class="help-block">
            <span class="help-block-label">输出路径</span>
            <code class="help-example">源文件夹 / &lt;TN&gt; / &lt;发票号&gt;-&lt;用户名&gt;-&lt;TN&gt;.pdf</code>
          </div>

          <p class="help-note">
            <span>复制不移动</span>
            <span>·</span>
            <span>同名自动加序号</span>
            <span>·</span>
            <span>仅扫描顶层 PDF</span>
          </p>
        </div>

        <div id="logBox" class="log-box" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
