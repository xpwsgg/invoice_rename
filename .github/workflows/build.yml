name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos-arm64
            arch-suffix: arm64
          - os: macos-13
            artifact: macos-x86_64
            arch-suffix: x86_64
          - os: windows-latest
            artifact: windows-portable
            arch-suffix: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Fetch PDFium (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/fetch-pdfium.sh
          ./scripts/fetch-pdfium.sh

      - name: Fetch PDFium (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/fetch-pdfium.ps1

      - name: Build (Tauri)
        run: npm run tauri build

      - name: Rename macOS dmg
        if: runner.os == 'macOS'
        run: mv src-tauri/target/release/bundle/dmg/*.dmg ESI-Invoice-Rename-${{ matrix.arch-suffix }}.dmg

      - name: Rename Windows portable exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item src-tauri/target/release/pdf_rename.exe ESI-Invoice-Rename.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ESI-Invoice-Rename-${{ matrix.arch-suffix }}.dmg

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ESI-Invoice-Rename.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ESI-Invoice-Rename-*.dmg
            ESI-Invoice-Rename.exe
          fail_on_unmatched_files: false
