name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal-apple-darwin

      - run: npm ci

      - name: Fetch PDFium (universal)
        run: |
          chmod +x scripts/fetch-pdfium.sh
          ./scripts/fetch-pdfium.sh universal

      - name: Build (Tauri, universal)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Rename DMG
        run: mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg ESI-Invoice-Rename-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: ESI-Invoice-Rename-macOS.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ESI-Invoice-Rename-macOS.dmg

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Fetch PDFium (Windows)
        shell: pwsh
        run: ./scripts/fetch-pdfium.ps1

      - name: Build (Tauri, Windows)
        run: npm run tauri build

      - name: Rename Windows portable exe
        shell: pwsh
        run: Copy-Item src-tauri/target/release/pdf_rename.exe ESI-Invoice-Rename.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: ESI-Invoice-Rename.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ESI-Invoice-Rename.exe
